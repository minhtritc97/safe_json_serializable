name: safe_json_serializable
description: >-
  Crash-safe drop-in for json_serializable: runs its generator with tolerant
  TypeHelpers so backend type changes never crash fromJson. No fork, no
  per-field annotations.
version: 0.2.0
repository: https://github.com/minhtritc97/safe_json_serializable
issue_tracker: https://github.com/minhtritc97/safe_json_serializable/issues
topics:
  - json
  - codegen
  - build-runner
  - json-serializable

environment:
  sdk: ^3.8.0

dependencies:
  analyzer: ">=6.0.0 <20.0.0"
  build: ">=2.4.0 <5.0.0"
  json_annotation: ^4.12.0
  # Bounded, not `any`: this builder depends on json_serializable's internal
  # TypeHelper API, which can change across majors. ^6.14.0 allows all 6.x.
  json_serializable: ^6.14.0
  source_gen: ">=1.4.0 <5.0.0"

dev_dependencies:
  build_runner: ^2.4.0
  test: ^1.25.0
