name: safe_type_helpers_builder
description: >-
  build_runner builder for safe_type_helpers: runs json_serializable with
  crash-safe TypeHelpers so fromJson tolerates backend type changes.
version: 0.1.0
repository: https://github.com/minhtritc97/safe_type_helpers
issue_tracker: https://github.com/minhtritc97/safe_type_helpers/issues
topics:
  - json
  - codegen
  - build-runner
  - json-serializable

environment:
  sdk: ^3.8.0

dependencies:
  analyzer: ">=6.0.0 <20.0.0"
  build: ">=2.4.0 <5.0.0"
  json_serializable: ^6.14.0
  source_gen: ">=1.4.0 <5.0.0"

dev_dependencies:
  build_runner: ^2.4.0
  test: ^1.25.0
